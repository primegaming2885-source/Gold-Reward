name: gold_reward
description: Gold Reward - Earn coins by watching ads and playing quizzes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  google_sign_in: ^6.2.1
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  lottie: ^3.0.0
  animate_do: ^3.3.4
  flutter_staggered_animations: ^1.1.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  cached_network_image: ^3.3.1
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1
  webview_flutter: ^4.4.2
  http: ^1.2.0
  provider: ^6.1.2
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
